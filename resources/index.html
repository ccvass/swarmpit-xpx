<script>
    // Unregister any existing service workers (they cause caching issues)
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
        });
    }
</script>
