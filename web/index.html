<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Swarmpit XPX</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="icon" href="/favicon.ico">
  <style>
    :root{--nav-w:220px}
    body{margin:0;display:flex;min-height:100vh}
    nav.sidebar{width:var(--nav-w);background:var(--pico-card-background-color);border-right:1px solid var(--pico-muted-border-color);padding:1rem;position:fixed;height:100vh;overflow-y:auto}
    nav.sidebar h4{margin:0 0 1rem}
    nav.sidebar a{display:block;padding:.4rem .6rem;border-radius:4px;text-decoration:none;color:var(--pico-color);font-size:.9rem}
    nav.sidebar a:hover,nav.sidebar a.active{background:var(--pico-primary-focus)}
    nav.sidebar a.active{font-weight:600}
    main{margin-left:var(--nav-w);padding:1.5rem;flex:1;max-width:calc(100vw - var(--nav-w))}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem}
    .stat-card{padding:1rem;border-radius:8px;background:var(--pico-card-background-color);border:1px solid var(--pico-muted-border-color)}
    .stat-card h3{margin:0;font-size:2rem}
    .stat-card small{color:var(--pico-muted-color)}
    table{font-size:.85rem}
    .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.75rem;font-weight:600}
    .badge-green{background:#d4edda;color:#155724}
    .badge-red{background:#f8d7da;color:#721c24}
    .badge-blue{background:#cce5ff;color:#004085}
    .badge-gray{background:#e2e3e5;color:#383d41}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    @media(max-width:768px){nav.sidebar{display:none}main{margin-left:0}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import{h,render,Component}from'https://esm.sh/preact@10';
    import{useState,useEffect,useCallback}from'https://esm.sh/preact@10/hooks';
    import htm from'https://esm.sh/htm@3';
    const html=htm.bind(h);

    // --- API ---
    const API={
      token:localStorage.getItem('token'),
      async call(path,opts={}){
        const headers={'Content-Type':'application/json'};
        if(this.token)headers.Authorization=this.token;
        const r=await fetch(path,{...opts,headers:{...headers,...opts.headers}});
        if(r.status===401){this.token=null;localStorage.removeItem('token');location.hash='#/login';return null}
        return r.json()
      },
      get(p){return this.call(p)},
      post(p,b){return this.call(p,{method:'POST',body:JSON.stringify(b)})},
      login(u,p){return this.call('/login',{method:'POST',headers:{Authorization:'Basic '+btoa(u+':'+p)}})},
      setToken(t){this.token=t;localStorage.setItem('token',t)}
    };

    // --- Router ---
    function useRoute(){
      const[route,setRoute]=useState(location.hash||'#/');
      useEffect(()=>{const h=()=>setRoute(location.hash||'#/');window.addEventListener('hashchange',h);return()=>window.removeEventListener('hashchange',h)},[]);
      const[path,...rest]=route.slice(2).split('/');
      return{path:path||'',param:rest.join('/')}
    }

    // --- Components ---
    function Badge({status}){
      const s=status?.toLowerCase()||'';
      const c=s.includes('running')||s==='ready'||s==='active'?'green':s.includes('shutdown')||s==='down'||s==='drain'?'red':s.includes('reachable')||s==='leader'?'blue':'gray';
      return html\`<span class="badge badge-\${c}">\${status||'unknown'}</span>\`
    }

    function Login(){
      const[u,setU]=useState('');const[p,setP]=useState('');const[err,setErr]=useState('');
      const submit=async e=>{e.preventDefault();const r=await API.login(u,p);if(r?.token){API.setToken(r.token);location.hash='#/'}else setErr('Invalid credentials')};
      return html\`<main style="margin-left:0;display:flex;justify-content:center;align-items:center;height:100vh">
        <article style="width:350px"><h3>Swarmpit XPX</h3>
        \${err&&html\`<p style="color:red">\${err}</p>\`}
        <form onSubmit=\${submit}><input placeholder="Username" value=\${u} onInput=\${e=>setU(e.target.value)} required/>
        <input type="password" placeholder="Password" value=\${p} onInput=\${e=>setP(e.target.value)} required/>
        <button type="submit">Login</button></form></article></main>\`
    }

    function Initialize(){
      const[f,setF]=useState({username:'',password:'',email:''});const[err,setErr]=useState('');
      const submit=async e=>{e.preventDefault();const r=await API.post('/initialize',f);if(r?.error)setErr(r.error);else location.hash='#/login'};
      return html\`<main style="margin-left:0;display:flex;justify-content:center;align-items:center;height:100vh">
        <article style="width:350px"><h3>Setup Admin</h3>\${err&&html\`<p style="color:red">\${err}</p>\`}
        <form onSubmit=\${submit}><input placeholder="Username" onInput=\${e=>setF({...f,username:e.target.value})} required/>
        <input type="password" placeholder="Password" onInput=\${e=>setF({...f,password:e.target.value})} required/>
        <input type="email" placeholder="Email" onInput=\${e=>setF({...f,email:e.target.value})}/>
        <button type="submit">Create Admin</button></form></article></main>\`
    }

    function Sidebar({path}){
      const links=[['','Dashboard'],['services','Services'],['stacks','Stacks'],['nodes','Nodes'],
        ['networks','Networks'],['secrets','Secrets'],['configs','Configs'],['tasks','Tasks']];
      return html\`<nav class="sidebar"><h4>⬡ Swarmpit XPX</h4>
        \${links.map(([p,l])=>html\`<a href="#/\${p}" class=\${path===p?'active':''}>\${l}</a>\`)}
        <hr/><a href="#" onClick=\${()=>{API.token=null;localStorage.removeItem('token');location.hash='#/login'}}>Logout</a>
      </nav>\`
    }

    function Dashboard(){
      const[nodes,setNodes]=useState([]);const[services,setServices]=useState([]);
      useEffect(()=>{API.get('/api/nodes').then(d=>setNodes(d||[]));API.get('/api/services').then(d=>setServices(d||[]))},[]);
      const managers=nodes.filter(n=>n.ManagerStatus).length;
      const ready=nodes.filter(n=>n.Status?.State==='ready').length;
      return html\`<div class="topbar"><h2>Dashboard</h2></div>
        <div class="stats">
          <div class="stat-card"><small>Nodes</small><h3>\${nodes.length}</h3><small>\${ready} ready, \${managers} managers</small></div>
          <div class="stat-card"><small>Services</small><h3>\${services.length}</h3></div>
        </div>
        <h4>Nodes</h4><${Table} cols=\${['Hostname','Role','State','Availability','Engine']}
          rows=\${nodes.map(n=>[n.Description?.Hostname,n.ManagerStatus?'Manager':'Worker',n.Status?.State,n.Spec?.Availability,n.Description?.Engine?.EngineVersion])}/>
      \`
    }

    function Table({cols,rows,onRow}){
      return html\`<figure><table><thead><tr>\${cols.map(c=>html\`<th>\${c}</th>\`)}</tr></thead>
        <tbody>\${(rows||[]).map((r,i)=>html\`<tr style=\${onRow?'cursor:pointer':''} onClick=\${()=>onRow?.(i)}>\${r.map(c=>html\`<td>\${typeof c==='object'&&c?.props?c:c||'-'}</td>\`)}</tr>\`)}</tbody></table></figure>\`
    }

    function ResourceList({title,endpoint,cols,mapRow,detailHash}){
      const[data,setData]=useState([]);const[search,setSearch]=useState('');
      useEffect(()=>{API.get(endpoint).then(d=>setData(d||[]))},[endpoint]);
      const filtered=search?data.filter(d=>JSON.stringify(d).toLowerCase().includes(search.toLowerCase())):data;
      return html\`<div class="topbar"><h2>\${title} (\${filtered.length})</h2>
        <input type="search" placeholder="Filter..." style="width:250px" onInput=\${e=>setSearch(e.target.value)}/></div>
        <${Table} cols=\${cols} rows=\${filtered.map(mapRow)} onRow=\${detailHash?i=>{location.hash=detailHash(filtered[i])}:null}/>\`
    }

    function Services(){return html\`<${ResourceList} title="Services" endpoint="/api/services"
      cols=\${['Name','Image','Mode','Replicas','Updated']}
      mapRow=\${s=>[s.Spec?.Name,s.Spec?.TaskTemplate?.ContainerSpec?.Image?.split('@')[0],
        s.Spec?.Mode?.Replicated?'replicated':'global',
        s.Spec?.Mode?.Replicated?\`\${s.Spec.Mode.Replicated.Replicas||1}\`:'global',
        new Date(s.UpdatedAt).toLocaleDateString()]}
      detailHash=\${s=>'#/services/'+s.ID}/>\`}

    function Stacks(){return html\`<${ResourceList} title="Stacks" endpoint="/api/stacks"
      cols=\${['Name','Services']} mapRow=\${s=>[s.stackName,s.serviceCount]}/>\`}

    function Nodes(){return html\`<${ResourceList} title="Nodes" endpoint="/api/nodes"
      cols=\${['Hostname','Role','State','Availability','Engine']}
      mapRow=\${n=>[n.Description?.Hostname,n.ManagerStatus?html\`<${Badge} status="Manager"/>':'Worker',
        html\`<${Badge} status=\${n.Status?.State}/>\`,n.Spec?.Availability,n.Description?.Engine?.EngineVersion]}
      detailHash=\${n=>'#/nodes/'+n.ID}/>\`}

    function Networks(){return html\`<${ResourceList} title="Networks" endpoint="/api/networks"
      cols=\${['Name','Driver','Scope','Created']}
      mapRow=\${n=>[n.Name,n.Driver,n.Scope,new Date(n.Created).toLocaleDateString()]}/>\`}

    function Secrets(){return html\`<${ResourceList} title="Secrets" endpoint="/api/secrets"
      cols=\${['Name','Created','Updated']}
      mapRow=\${s=>[s.Spec?.Name,new Date(s.CreatedAt).toLocaleDateString(),new Date(s.UpdatedAt).toLocaleDateString()]}/>\`}

    function Configs(){return html\`<${ResourceList} title="Configs" endpoint="/api/configs"
      cols=\${['Name','Created','Updated']}
      mapRow=\${s=>[s.Spec?.Name,new Date(s.CreatedAt).toLocaleDateString(),new Date(s.UpdatedAt).toLocaleDateString()]}/>\`}

    function TasksView(){return html\`<${ResourceList} title="Tasks" endpoint="/api/tasks"
      cols=\${['ID','Service','Node','State','Updated']}
      mapRow=\${t=>[t.ID?.slice(0,12),t.ServiceID?.slice(0,12),t.NodeID?.slice(0,12),
        html\`<${Badge} status=\${t.Status?.State}/>\`,new Date(t.UpdatedAt).toLocaleDateString()]}/>\`}

    function ServiceInfo({id}){
      const[svc,setSvc]=useState(null);const[tasks,setTasks]=useState([]);
      useEffect(()=>{API.get('/api/services/'+id).then(setSvc);API.get('/api/tasks').then(t=>setTasks((t||[]).filter(x=>x.ServiceID===id)))},[id]);
      if(!svc)return html\`<p>Loading...</p>\`;
      const spec=svc.Spec||{};
      return html\`<div class="topbar"><h2>\${spec.Name}</h2></div>
        <article><dl>
          <dt>Image</dt><dd>\${spec.TaskTemplate?.ContainerSpec?.Image?.split('@')[0]}</dd>
          <dt>Mode</dt><dd>\${spec.Mode?.Replicated?'Replicated ('+spec.Mode.Replicated.Replicas+')':'Global'}</dd>
          <dt>Created</dt><dd>\${new Date(svc.CreatedAt).toLocaleString()}</dd>
          <dt>Updated</dt><dd>\${new Date(svc.UpdatedAt).toLocaleString()}</dd>
        </dl></article>
        <h4>Tasks (\${tasks.length})</h4>
        <${Table} cols=\${['ID','Node','State','Message','Updated']}
          rows=\${tasks.map(t=>[t.ID?.slice(0,12),t.NodeID?.slice(0,12),html\`<${Badge} status=\${t.Status?.State}/>\`,t.Status?.Message,new Date(t.UpdatedAt).toLocaleString()])}/>\`
    }

    // --- App ---
    function App(){
      const{path,param}=useRoute();
      const[ver,setVer]=useState(null);
      useEffect(()=>{fetch('/version').then(r=>r.json()).then(setVer)},[]);

      if(!ver)return html\`<p>Loading...</p>\`;
      if(!ver.initialized&&path!=='login')return html\`<${Initialize}/>\`;
      if(!API.token||path==='login')return html\`<${Login}/>\`;

      const views={
        '':Dashboard, services:Services, stacks:Stacks, nodes:Nodes,
        networks:Networks, secrets:Secrets, configs:Configs, tasks:TasksView
      };
      // Detail views
      if(path==='services'&&param)return html\`<${Sidebar} path=\${path}/><main><${ServiceInfo} id=\${param}/></main>\`;

      const View=views[path]||Dashboard;
      return html\`<${Sidebar} path=\${path}/><main><${View}/></main>\`
    }

    render(html\`<${App}/>\`,document.getElementById('app'));
  </script>
</body>
</html>
