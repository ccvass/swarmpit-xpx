<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Swarmpit XPX</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    :root{--nav-w:220px}
    body{margin:0;display:flex;min-height:100vh}
    nav.sidebar{width:var(--nav-w);background:var(--pico-card-background-color);border-right:1px solid var(--pico-muted-border-color);padding:1rem;position:fixed;height:100vh;overflow-y:auto}
    nav.sidebar h4{margin:0 0 1rem}
    nav.sidebar a{display:block;padding:.4rem .6rem;border-radius:4px;text-decoration:none;color:var(--pico-color);font-size:.9rem}
    nav.sidebar a:hover,nav.sidebar a.active{background:var(--pico-primary-focus)}
    main.content{margin-left:var(--nav-w);padding:1.5rem;flex:1}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem}
    .stat-card{padding:1rem;border-radius:8px;background:var(--pico-card-background-color);border:1px solid var(--pico-muted-border-color)}
    .stat-card h3{margin:0;font-size:2rem}
    .stat-card small{color:var(--pico-muted-color)}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.75rem;font-weight:600}
    .bg{background:#d4edda;color:#155724}.br{background:#f8d7da;color:#721c24}.bb{background:#cce5ff;color:#004085}.by{background:#e2e3e5;color:#383d41}
    table{font-size:.85rem}
    @media(max-width:768px){nav.sidebar{display:none}main.content{margin-left:0}}
  </style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { h, render } from 'https://esm.sh/preact@10';
import { useState, useEffect } from 'https://esm.sh/preact@10/hooks';
import htm from 'https://esm.sh/htm@3';
const html = htm.bind(h);

const api = {
  token: localStorage.getItem('token'),
  async req(path, opts = {}) {
    const hdrs = { 'Content-Type': 'application/json' };
    if (this.token) hdrs.Authorization = this.token;
    const r = await fetch(path, { ...opts, headers: { ...hdrs, ...opts.headers } });
    if (r.status === 401) { this.token = null; localStorage.removeItem('token'); location.hash = '#/login'; return null; }
    return r.json();
  },
  get(p) { return this.req(p); },
  post(p, b) { return this.req(p, { method: 'POST', body: JSON.stringify(b) }); },
  login(u, p) { return this.req('/login', { method: 'POST', headers: { Authorization: 'Basic ' + btoa(u + ':' + p) } }); },
  setToken(t) { this.token = t; localStorage.setItem('token', t); }
};

function useRoute() {
  const [route, setRoute] = useState(location.hash || '#/');
  useEffect(() => { const fn = () => setRoute(location.hash || '#/'); window.addEventListener('hashchange', fn); return () => window.removeEventListener('hashchange', fn); }, []);
  const parts = route.slice(2).split('/');
  return { path: parts[0] || '', param: parts.slice(1).join('/') };
}

function badge(status) {
  const s = (status || '').toLowerCase();
  const c = s.includes('running') || s === 'ready' || s === 'active' ? 'bg' : s.includes('shutdown') || s === 'down' || s === 'drain' ? 'br' : s.includes('leader') || s === 'reachable' ? 'bb' : 'by';
  return html`<span class="badge ${c}">${status || 'unknown'}</span>`;
}

function Login() {
  const [u, setU] = useState('');
  const [p, setP] = useState('');
  const [err, setErr] = useState('');
  const go = async (e) => { e.preventDefault(); const r = await api.login(u, p); if (r && r.token) { api.setToken(r.token); location.hash = '#/'; } else setErr('Invalid credentials'); };
  return html`<main style="margin:0;display:flex;justify-content:center;align-items:center;height:100vh">
    <article style="width:350px"><h3>Swarmpit XPX</h3>
    ${err && html`<p style="color:red">${err}</p>`}
    <form onSubmit=${go}><input placeholder="Username" value=${u} onInput=${e => setU(e.target.value)} required />
    <input type="password" placeholder="Password" value=${p} onInput=${e => setP(e.target.value)} required />
    <button type="submit">Login</button></form></article></main>`;
}

function Init() {
  const [f, setF] = useState({ username: '', password: '', email: '' });
  const [err, setErr] = useState('');
  const go = async (e) => { e.preventDefault(); const r = await api.post('/initialize', f); if (r && r.error) setErr(r.error); else location.hash = '#/login'; };
  return html`<main style="margin:0;display:flex;justify-content:center;align-items:center;height:100vh">
    <article style="width:350px"><h3>Setup Admin</h3>${err && html`<p style="color:red">${err}</p>`}
    <form onSubmit=${go}><input placeholder="Username" onInput=${e => setF({ ...f, username: e.target.value })} required />
    <input type="password" placeholder="Password" onInput=${e => setF({ ...f, password: e.target.value })} required />
    <input type="email" placeholder="Email" onInput=${e => setF({ ...f, email: e.target.value })} />
    <button type="submit">Create Admin</button></form></article></main>`;
}

function Nav({ path }) {
  const links = [['', 'Dashboard'], ['services', 'Services'], ['stacks', 'Stacks'], ['nodes', 'Nodes'], ['networks', 'Networks'], ['secrets', 'Secrets'], ['configs', 'Configs'], ['tasks', 'Tasks']];
  const logout = () => { api.token = null; localStorage.removeItem('token'); location.hash = '#/login'; };
  return html`<nav class="sidebar"><h4>⬡ XPX</h4>
    ${links.map(([p, l]) => html`<a href="#/${p}" class=${path === p ? 'active' : ''}>${l}</a>`)}
    <hr /><a href="#" onClick=${logout}>Logout</a></nav>`;
}

function Tbl({ cols, rows, onClick }) {
  return html`<figure><table><thead><tr>${cols.map(c => html`<th>${c}</th>`)}</tr></thead>
    <tbody>${(rows || []).map((r, i) => html`<tr style=${onClick ? 'cursor:pointer' : ''} onClick=${() => onClick && onClick(i)}>
      ${r.map(c => html`<td>${c || '-'}</td>`)}</tr>`)}</tbody></table></figure>`;
}

function List({ title, endpoint, cols, mapRow, detail }) {
  const [data, setData] = useState([]);
  const [q, setQ] = useState('');
  useEffect(() => { api.get(endpoint).then(d => setData(d || [])); }, [endpoint]);
  const f = q ? data.filter(d => JSON.stringify(d).toLowerCase().includes(q.toLowerCase())) : data;
  return html`<div class="topbar"><h2>${title} (${f.length})</h2>
    <input type="search" placeholder="Filter..." style="width:250px" onInput=${e => setQ(e.target.value)} /></div>
    <${Tbl} cols=${cols} rows=${f.map(mapRow)} onClick=${detail ? i => { location.hash = detail(f[i]); } : null} />`;
}

function Dashboard() {
  const [nodes, setNodes] = useState([]);
  const [svcs, setSvcs] = useState([]);
  useEffect(() => { api.get('/api/nodes').then(d => setNodes(d || [])); api.get('/api/services').then(d => setSvcs(d || [])); }, []);
  return html`<div class="topbar"><h2>Dashboard</h2></div>
    <div class="stats">
      <div class="stat-card"><small>Nodes</small><h3>${nodes.length}</h3></div>
      <div class="stat-card"><small>Services</small><h3>${svcs.length}</h3></div>
    </div>
    <h4>Nodes</h4>
    <${Tbl} cols=${['Hostname', 'Role', 'State', 'Engine']}
      rows=${nodes.map(n => [n.Description?.Hostname, n.ManagerStatus ? 'Manager' : 'Worker', badge(n.Status?.State), n.Description?.Engine?.EngineVersion])} />`;
}

function SvcDetail({ id }) {
  const [svc, setSvc] = useState(null);
  const [tasks, setTasks] = useState([]);
  useEffect(() => { api.get('/api/services/' + id).then(setSvc); api.get('/api/tasks').then(t => setTasks((t || []).filter(x => x.ServiceID === id))); }, [id]);
  if (!svc) return html`<p>Loading...</p>`;
  const s = svc.Spec || {};
  return html`<h2>${s.Name}</h2>
    <article><dl>
      <dt>Image</dt><dd>${s.TaskTemplate?.ContainerSpec?.Image?.split('@')[0]}</dd>
      <dt>Mode</dt><dd>${s.Mode?.Replicated ? 'Replicated (' + (s.Mode.Replicated.Replicas || 1) + ')' : 'Global'}</dd>
      <dt>Updated</dt><dd>${new Date(svc.UpdatedAt).toLocaleString()}</dd>
    </dl></article>
    <h4>Tasks (${tasks.length})</h4>
    <${Tbl} cols=${['ID', 'Node', 'State', 'Updated']}
      rows=${tasks.map(t => [t.ID?.slice(0, 12), t.NodeID?.slice(0, 12), badge(t.Status?.State), new Date(t.UpdatedAt).toLocaleString()])} />`;
}

function App() {
  const { path, param } = useRoute();
  const [ver, setVer] = useState(null);
  useEffect(() => { fetch('/version').then(r => r.json()).then(setVer); }, []);
  if (!ver) return html`<p>Loading...</p>`;
  if (!ver.initialized && path !== 'login') return html`<${Init} />`;
  if (!api.token || path === 'login') return html`<${Login} />`;

  let view;
  if (path === 'services' && param) view = html`<${SvcDetail} id=${param} />`;
  else if (path === '' || path === undefined) view = html`<${Dashboard} />`;
  else if (path === 'services') view = html`<${List} title="Services" endpoint="/api/services" cols=${['Name', 'Image', 'Mode', 'Replicas']}
    mapRow=${s => [s.Spec?.Name, s.Spec?.TaskTemplate?.ContainerSpec?.Image?.split('@')[0], s.Spec?.Mode?.Replicated ? 'replicated' : 'global', s.Spec?.Mode?.Replicated?.Replicas || '-']}
    detail=${s => '#/services/' + s.ID} />`;
  else if (path === 'stacks') view = html`<${List} title="Stacks" endpoint="/api/stacks" cols=${['Name', 'Services']} mapRow=${s => [s.stackName, s.serviceCount]} />`;
  else if (path === 'nodes') view = html`<${List} title="Nodes" endpoint="/api/nodes" cols=${['Hostname', 'Role', 'State', 'Engine']}
    mapRow=${n => [n.Description?.Hostname, n.ManagerStatus ? 'Manager' : 'Worker', badge(n.Status?.State), n.Description?.Engine?.EngineVersion]} />`;
  else if (path === 'networks') view = html`<${List} title="Networks" endpoint="/api/networks" cols=${['Name', 'Driver', 'Scope']} mapRow=${n => [n.Name, n.Driver, n.Scope]} />`;
  else if (path === 'secrets') view = html`<${List} title="Secrets" endpoint="/api/secrets" cols=${['Name', 'Created']} mapRow=${s => [s.Spec?.Name, new Date(s.CreatedAt).toLocaleDateString()]} />`;
  else if (path === 'configs') view = html`<${List} title="Configs" endpoint="/api/configs" cols=${['Name', 'Created']} mapRow=${s => [s.Spec?.Name, new Date(s.CreatedAt).toLocaleDateString()]} />`;
  else if (path === 'tasks') view = html`<${List} title="Tasks" endpoint="/api/tasks" cols=${['ID', 'Service', 'State', 'Updated']}
    mapRow=${t => [t.ID?.slice(0, 12), t.ServiceID?.slice(0, 12), badge(t.Status?.State), new Date(t.UpdatedAt).toLocaleDateString()]} />`;
  else view = html`<${Dashboard} />`;

  return html`<${Nav} path=${path} /><main class="content">${view}</main>`;
}

render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
