<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Swarmpit XPX</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:14px}
    .layout{display:flex;min-height:100vh}

    /* Sidebar */
    .sb{width:230px;background:#1a1a2e;color:#fff;position:fixed;height:100vh;display:flex;flex-direction:column;z-index:10}
    .sb-logo{padding:1rem 1.2rem;font-weight:700;font-size:1rem;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:.5rem}
    .sb-logo span{color:#7c6fff}
    .sb-menu{flex:1;padding:.4rem 0;overflow-y:auto}
    .sb-menu a{display:flex;align-items:center;gap:.6rem;padding:.55rem 1.2rem;color:rgba(255,255,255,.6);text-decoration:none;font-size:.82rem;border-left:3px solid transparent;transition:.15s}
    .sb-menu a:hover{color:#fff;background:rgba(255,255,255,.05)}
    .sb-menu a.on{color:#fff;background:rgba(124,111,255,.2);border-left-color:#7c6fff}
    .sb-menu .sep{height:1px;background:rgba(255,255,255,.06);margin:.5rem 1.2rem}
    .sb-foot{padding:.8rem 1.2rem;border-top:1px solid rgba(255,255,255,.06)}
    .sb-foot a{color:rgba(255,255,255,.4);text-decoration:none;font-size:.8rem}

    /* Main */
    .mn{margin-left:230px;padding:1.5rem 2rem;min-height:100vh}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem}
    .top h1{font-size:1.4rem;font-weight:600}
    .top .cnt{color:#999;font-weight:400}

    /* Cards */
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:.8rem;margin-bottom:1.5rem}
    .crd{background:#fff;border-radius:10px;padding:1rem 1.2rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .crd .lb{font-size:.7rem;color:#999;text-transform:uppercase;letter-spacing:.5px}
    .crd .vl{font-size:1.8rem;font-weight:700;margin:.1rem 0}
    .crd .sm{font-size:.75rem;color:#bbb}

    /* Tables */
    .tbl{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .tbl table{width:100%;border-collapse:collapse}
    .tbl th{background:#f8f9fb;padding:.6rem .8rem;text-align:left;font-weight:600;color:#666;font-size:.72rem;text-transform:uppercase;letter-spacing:.3px}
    .tbl td{padding:.55rem .8rem;border-top:1px solid #f0f0f0;font-size:.83rem}
    .tbl tr.ck:hover{background:#f8f9fb;cursor:pointer}

    /* Badges */
    .bg{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.7rem;font-weight:600}
    .bg-g{background:#e8f5e9;color:#2e7d32}.bg-r{background:#ffebee;color:#c62828}
    .bg-b{background:#e3f2fd;color:#1565c0}.bg-y{background:#fff3e0;color:#e65100}.bg-x{background:#f5f5f5;color:#616161}

    /* Detail */
    .det{background:#fff;border-radius:10px;padding:1.2rem;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:1rem}
    .det h3{font-size:1rem;margin-bottom:.8rem;padding-bottom:.5rem;border-bottom:1px solid #f0f0f0}
    .det .row{display:flex;padding:.35rem 0;font-size:.85rem}
    .det .lk{width:160px;color:#888;flex-shrink:0}
    .det .lv{flex:1;word-break:break-all}

    /* Tabs */
    .tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:2px solid #eee}
    .tabs a{padding:.5rem 1rem;text-decoration:none;color:#888;font-size:.85rem;border-bottom:2px solid transparent;margin-bottom:-2px}
    .tabs a.on{color:#7c6fff;border-bottom-color:#7c6fff;font-weight:600}

    /* Search */
    .srch{padding:.45rem .8rem;border:1px solid #ddd;border-radius:6px;font-size:.82rem;width:240px;outline:none}
    .srch:focus{border-color:#7c6fff}

    /* Buttons */
    .btn{padding:.4rem .9rem;border:none;border-radius:6px;font-size:.82rem;cursor:pointer;font-weight:500}
    .btn-p{background:#7c6fff;color:#fff}.btn-p:hover{background:#6a5acd}
    .btn-d{background:#ffebee;color:#c62828}.btn-d:hover{background:#ffcdd2}
    .btn-s{background:#f5f5f5;color:#555}.btn-s:hover{background:#eee}

    /* Logs */
    .logs{background:#1a1a2e;color:#0f0;padding:1rem;border-radius:8px;font-family:monospace;font-size:.75rem;max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}

    /* Login */
    .login-bg{display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e)}
    .login-box{background:#fff;padding:2.5rem;border-radius:14px;width:370px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
    .login-box h2{font-size:1.3rem;margin-bottom:.2rem}.login-box p{color:#999;font-size:.85rem;margin-bottom:1.5rem}
    .login-box input{width:100%;padding:.6rem .8rem;margin-bottom:.7rem;border:1px solid #ddd;border-radius:6px;font-size:.85rem}
    .login-box button{width:100%;padding:.65rem;background:#7c6fff;color:#fff;border:none;border-radius:6px;font-size:.9rem;font-weight:600;cursor:pointer}
    .login-box .err{color:#c62828;font-size:.82rem;margin-bottom:.5rem}

    @media(max-width:768px){.sb{display:none}.mn{margin-left:0;padding:1rem}}
  </style>
</head>
<body>
<div id="app"></div>
<script type="module">
import{h,render}from'https://esm.sh/preact@10';
import{useState,useEffect}from'https://esm.sh/preact@10/hooks';
import htm from'https://esm.sh/htm@3';
const html=htm.bind(h);

/* ── API ── */
const api={
  token:localStorage.getItem('tk'),
  async r(p,o={}){const hd={'Content-Type':'application/json'};if(this.token)hd.Authorization=this.token;try{const r=await fetch(p,{...o,headers:{...hd,...o.headers}});if(r.status===401){this.out();return null}return r.json()}catch(e){return null}},
  g(p){return this.r(p)},
  p(p,b){return this.r(p,{method:'POST',body:JSON.stringify(b)})},
  del(p){return this.r(p,{method:'DELETE'})},
  login(u,p){return this.r('/login',{method:'POST',headers:{Authorization:'Basic '+btoa(u+':'+p)}})},
  in(t){this.token=t;localStorage.setItem('tk',t)},
  out(){this.token=null;localStorage.removeItem('tk');location.hash='#/login'}
};

/* ── Router ── */
function useRoute(){
  const[rt,set]=useState(location.hash||'#/');
  useEffect(()=>{const f=()=>set(location.hash||'#/');addEventListener('hashchange',f);return()=>removeEventListener('hashchange',f)},[]);
  const s=rt.slice(2).split('/');return{p:s[0]||'',id:s.slice(1).join('/')}
}

/* ── Helpers ── */
function bg(s){const l=(s||'').toLowerCase();const c=l.includes('running')||l==='ready'||l==='active'||l==='complete'?'bg-g':l.includes('shutdown')||l==='down'||l==='drain'||l.includes('fail')||l.includes('reject')?'bg-r':l==='leader'||l==='reachable'||l.includes('preparing')||l.includes('assigned')?'bg-b':l.includes('pending')||l.includes('accepted')?'bg-y':'bg-x';return html`<span class="bg ${c}">${s||'-'}</span>`}
function ago(d){if(!d)return'-';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}
function bytes(b){if(!b)return'-';if(b>1e9)return(b/1e9).toFixed(1)+' GB';if(b>1e6)return(b/1e6).toFixed(0)+' MB';return(b/1e3).toFixed(0)+' KB'}

/* ── Auth ── */
function Login(){
  const[u,su]=useState('');const[p,sp]=useState('');const[e,se]=useState('');
  const go=async ev=>{ev.preventDefault();const r=await api.login(u,p);if(r?.token){api.in(r.token);location.hash='#/';location.reload()}else se('Invalid credentials')};
  return html`<div class=login-bg><div class=login-box><h2>⬡ Swarmpit XPX</h2><p>Docker Swarm Management</p>${e&&html`<div class=err>${e}</div>`}<form onSubmit=${go}><input placeholder=Username value=${u} onInput=${e=>su(e.target.value)} required/><input type=password placeholder=Password value=${p} onInput=${e=>sp(e.target.value)} required/><button>Sign In</button></form></div></div>`
}
function Init(){
  const[f,sf]=useState({username:'',password:'',email:''});const[e,se]=useState('');
  const go=async ev=>{ev.preventDefault();const r=await api.p('/initialize',f);if(r?.error)se(r.error);else location.hash='#/login'};
  return html`<div class=login-bg><div class=login-box><h2>Welcome</h2><p>Create admin account</p>${e&&html`<div class=err>${e}</div>`}<form onSubmit=${go}><input placeholder=Username onInput=${e=>sf({...f,username:e.target.value})} required/><input type=password placeholder=Password onInput=${e=>sf({...f,password:e.target.value})} required/><input type=email placeholder=Email onInput=${e=>sf({...f,email:e.target.value})}/><button>Create Admin</button></form></div></div>`
}

/* ── Nav ── */
function Nav({p}){
  const m=[['','Dashboard'],['services','Services'],['stacks','Stacks'],['nodes','Nodes'],['networks','Networks'],['volumes','Volumes'],['secrets','Secrets'],['configs','Configs'],['tasks','Tasks']];
  return html`<div class=sb><div class=sb-logo><span>⬡</span> Swarmpit XPX</div><div class=sb-menu>${m.map(([k,l])=>html`<a href="#/${k}" class=${p===k?'on':''}>${l}</a>`)}<div class=sep/><a href="#/audit" class=${p==='audit'?'on':''}>Audit Log</a></div><div class=sb-foot><a href=# onClick=${()=>api.out()}>← Sign Out</a></div></div>`
}

/* ── Table ── */
function T({c,r,ck}){return html`<div class=tbl><table><thead><tr>${c.map(h=>html`<th>${h}</th>`)}</tr></thead><tbody>${(r||[]).map((row,i)=>html`<tr class=${ck?'ck':''} onClick=${()=>ck?.(i)}>${row.map(v=>html`<td>${v==null?'-':v}</td>`)}</tr>`)}</tbody></table></div>`}

/* ── Dashboard ── */
function Dashboard(){
  const[n,sn]=useState([]);const[sv,ssv]=useState([]);
  useEffect(()=>{api.g('/api/nodes').then(d=>d&&sn(d));api.g('/api/services').then(d=>d&&ssv(d))},[]);
  const mgr=n.filter(x=>x.ManagerStatus).length,rdy=n.filter(x=>x.Status?.State==='ready').length;
  const stks=new Set(sv.map(s=>s.Spec?.Labels?.['com.docker.stack.namespace']).filter(Boolean)).size;
  const running=sv.filter(s=>s.Spec?.Mode?.Replicated).reduce((a,s)=>a+(s.Spec.Mode.Replicated.Replicas||0),0);
  return html`<div class=top><h1>Dashboard</h1></div>
    <div class=cards>
      <div class=crd><div class=lb>Nodes</div><div class=vl>${n.length}</div><div class=sm>${rdy} ready · ${mgr} managers</div></div>
      <div class=crd><div class=lb>Services</div><div class=vl>${sv.length}</div><div class=sm>${stks} stacks</div></div>
      <div class=crd><div class=lb>Replicas</div><div class=vl>${running}</div><div class=sm>desired</div></div>
    </div>
    <h3 style="margin-bottom:.6rem;font-size:.95rem">Nodes</h3>
    <${T} c=${['Hostname','Role','State','Availability','CPU','Memory','Engine']}
      r=${n.map(x=>[x.Description?.Hostname,x.ManagerStatus?'Manager':'Worker',bg(x.Status?.State),bg(x.Spec?.Availability),x.Description?.Resources?.NanoCPUs?(x.Description.Resources.NanoCPUs/1e9).toFixed(0)+' cores':'-',bytes(x.Description?.Resources?.MemoryBytes),x.Description?.Engine?.EngineVersion])}
      ck=${i=>{location.hash='#/nodes/'+n[i].ID}}/>`
}

/* ── List view factory ── */
function Ls({title,ep,cols,map,det}){
  const[d,sd]=useState([]);const[q,sq]=useState('');
  useEffect(()=>{api.g(ep).then(x=>x&&sd(x))},[ep]);
  const f=q?d.filter(x=>JSON.stringify(x).toLowerCase().includes(q.toLowerCase())):d;
  return html`<div class=top><h1>${title} <span class=cnt>${f.length}</span></h1><input class=srch placeholder=Search... onInput=${e=>sq(e.target.value)}/></div>
    <${T} c=${cols} r=${f.map(map)} ck=${det?i=>{location.hash=det(f[i])}:null}/>`
}

/* ── Service Detail ── */
function SvcDet({id}){
  const[s,ss]=useState(null);const[t,st]=useState([]);const[logs,sl]=useState('');const[tab,stab]=useState('tasks');
  useEffect(()=>{api.g('/api/services/'+id).then(d=>d&&ss(d));api.g('/api/tasks').then(d=>d&&st(d.filter(x=>x.ServiceID===id).sort((a,b)=>(b.UpdatedAt||'').localeCompare(a.UpdatedAt||''))))},[id]);
  const loadLogs=()=>api.g('/api/services/'+id+'/logs?tail=200').then(d=>d&&sl(d.logs||''));
  if(!s)return html`<p>Loading...</p>`;
  const sp=s.Spec||{},cs=sp.TaskTemplate?.ContainerSpec||{},res=sp.TaskTemplate?.Resources||{};
  const env=(cs.Env||[]).map(e=>{const[k,...v]=e.split('=');return[k,v.join('=')]});
  const ports=(s.Endpoint?.Ports||[]).map(p=>p.PublishedPort+':'+p.TargetPort+'/'+p.Protocol);
  const mounts=(cs.Mounts||[]).map(m=>m.Source+' → '+m.Target+' ('+m.Type+')');
  const labels=Object.entries(sp.Labels||{});
  return html`<div class=top><h1>${sp.Name}</h1><div><button class="btn btn-d" onClick=${async()=>{if(confirm('Delete service?')){await api.del('/api/services/'+id);location.hash='#/services'}}}>Delete</button></div></div>
    <div class=det><h3>Configuration</h3>
      <div class=row><div class=lk>Image</div><div class=lv>${cs.Image?.split('@')[0]}</div></div>
      <div class=row><div class=lk>Mode</div><div class=lv>${sp.Mode?.Replicated?'Replicated ('+sp.Mode.Replicated.Replicas+')':'Global'}</div></div>
      <div class=row><div class=lk>Created</div><div class=lv>${new Date(s.CreatedAt).toLocaleString()}</div></div>
      <div class=row><div class=lk>Updated</div><div class=lv>${ago(s.UpdatedAt)}</div></div>
      ${res.Limits&&html`<div class=row><div class=lk>CPU Limit</div><div class=lv>${res.Limits.NanoCPUs?(res.Limits.NanoCPUs/1e9).toFixed(2)+' cores':'-'}</div></div>
      <div class=row><div class=lk>Memory Limit</div><div class=lv>${bytes(res.Limits.MemoryBytes)}</div></div>`}
      ${ports.length>0&&html`<div class=row><div class=lk>Ports</div><div class=lv>${ports.join(', ')}</div></div>`}
      ${mounts.length>0&&html`<div class=row><div class=lk>Mounts</div><div class=lv>${mounts.map(m=>html`<div>${m}</div>`)}</div></div>`}
    </div>
    ${env.length>0&&html`<div class=det><h3>Environment (${env.length})</h3>${env.map(([k,v])=>html`<div class=row><div class=lk style="font-family:monospace;font-size:.8rem">${k}</div><div class=lv style="font-family:monospace;font-size:.8rem">${v}</div></div>`)}</div>`}
    ${labels.length>0&&html`<div class=det><h3>Labels (${labels.length})</h3>${labels.map(([k,v])=>html`<div class=row><div class=lk style="font-family:monospace;font-size:.78rem">${k}</div><div class=lv style="font-size:.78rem">${v}</div></div>`)}</div>`}
    <div class=tabs><a class=${tab==='tasks'?'on':''} href=# onClick=${()=>stab('tasks')}>Tasks (${t.length})</a><a class=${tab==='logs'?'on':''} href=# onClick=${()=>{stab('logs');loadLogs()}}>Logs</a></div>
    ${tab==='tasks'&&html`<${T} c=${['ID','Node','State','Message','Updated']} r=${t.map(x=>[x.ID?.slice(0,12),x.NodeID?.slice(0,12),bg(x.Status?.State),x.Status?.Message||'',ago(x.UpdatedAt)])}/>`}
    ${tab==='logs'&&html`<div class=logs>${logs||'Loading...'}</div>`}`
}

/* ── Node Detail ── */
function NodeDet({id}){
  const[d,sd]=useState(null);
  useEffect(()=>{api.g('/api/nodes/'+id).then(x=>x&&sd(x))},[id]);
  if(!d)return html`<p>Loading...</p>`;
  const n=d.node,ts=d.tasks||[];
  const desc=n.Description||{},res=desc.Resources||{};
  return html`<div class=top><h1>${desc.Hostname}</h1></div>
    <div class=det><h3>Node Info</h3>
      <div class=row><div class=lk>ID</div><div class=lv>${n.ID}</div></div>
      <div class=row><div class=lk>Role</div><div class=lv>${n.ManagerStatus?'Manager':'Worker'}</div></div>
      <div class=row><div class=lk>State</div><div class=lv>${bg(n.Status?.State)}</div></div>
      <div class=row><div class=lk>Availability</div><div class=lv>${bg(n.Spec?.Availability)}</div></div>
      ${n.ManagerStatus&&html`<div class=row><div class=lk>Manager Status</div><div class=lv>${bg(n.ManagerStatus.Reachability)} ${n.ManagerStatus.Leader?'(Leader)':''}</div></div>`}
      <div class=row><div class=lk>CPU</div><div class=lv>${res.NanoCPUs?(res.NanoCPUs/1e9).toFixed(0)+' cores':'-'}</div></div>
      <div class=row><div class=lk>Memory</div><div class=lv>${bytes(res.MemoryBytes)}</div></div>
      <div class=row><div class=lk>Engine</div><div class=lv>${desc.Engine?.EngineVersion}</div></div>
      <div class=row><div class=lk>OS</div><div class=lv>${desc.Platform?.OS} ${desc.Platform?.Architecture}</div></div>
      <div class=row><div class=lk>Address</div><div class=lv>${n.Status?.Addr}</div></div>
    </div>
    <h3 style="margin:.8rem 0 .5rem;font-size:.95rem">Tasks on this node (${ts.length})</h3>
    <${T} c=${['ID','Service','State','Image','Updated']} r=${ts.map(x=>[x.ID?.slice(0,12),x.ServiceID?.slice(0,12),bg(x.Status?.State),x.Spec?.ContainerSpec?.Image?.split('@')[0]?.split(':')[0],ago(x.UpdatedAt)])}/>`
}

/* ── Audit ── */
function Audit(){
  const[d,sd]=useState([]);
  useEffect(()=>{api.g('/api/audit?limit=100').then(x=>x&&sd(x))},[]);
  return html`<div class=top><h1>Audit Log <span class=cnt>${d.length}</span></h1></div>
    <${T} c=${['Time','User','Action','Resource']} r=${d.map(x=>[new Date(x.timestamp*1000).toLocaleString(),x.username,x.action,x.resource_name])}/>`
}

/* ── App ── */
function App(){
  const{p,id}=useRoute();
  const[v,sv]=useState(null);
  useEffect(()=>{fetch('/version').then(r=>r.json()).then(sv).catch(()=>sv({initialized:false}))},[]);
  if(!v)return html`<div class=login-bg><p style="color:#fff">Loading...</p></div>`;
  if(!v.initialized)return html`<${Init}/>`;
  if(!api.token||p==='login')return html`<${Login}/>`;

  let view;
  if(p==='services'&&id)view=html`<${SvcDet} id=${id}/>`;
  else if(p==='nodes'&&id)view=html`<${NodeDet} id=${id}/>`;
  else if(!p)view=html`<${Dashboard}/>`;
  else if(p==='services')view=html`<${Ls} title=Services ep=/api/services cols=${['Name','Image','Mode','Replicas','Updated']} map=${s=>[s.Spec?.Name,s.Spec?.TaskTemplate?.ContainerSpec?.Image?.split('@')[0]?.split(':')[0],s.Spec?.Mode?.Replicated?'Replicated':'Global',s.Spec?.Mode?.Replicated?.Replicas||'-',ago(s.UpdatedAt)]} det=${s=>'#/services/'+s.ID}/>`;
  else if(p==='stacks')view=html`<${Ls} title=Stacks ep=/api/stacks cols=${['Name','Services']} map=${s=>[s.stackName,s.serviceCount]} det=${s=>'#/stacks/'+s.stackName}/>`;
  else if(p==='nodes')view=html`<${Ls} title=Nodes ep=/api/nodes cols=${['Hostname','Role','State','Availability','CPU','Memory','Engine']} map=${n=>[n.Description?.Hostname,n.ManagerStatus?'Manager':'Worker',bg(n.Status?.State),bg(n.Spec?.Availability),(n.Description?.Resources?.NanoCPUs/1e9||0).toFixed(0)+' cores',bytes(n.Description?.Resources?.MemoryBytes),n.Description?.Engine?.EngineVersion]} det=${n=>'#/nodes/'+n.ID}/>`;
  else if(p==='networks')view=html`<${Ls} title=Networks ep=/api/networks cols=${['Name','Driver','Scope','Created']} map=${n=>[n.Name,n.Driver,n.Scope,ago(n.Created)]}/>`;
  else if(p==='volumes')view=html`<${Ls} title=Volumes ep=/api/volumes cols=${['Name','Driver','Scope','Created']} map=${v=>[v?.Name,v?.Driver,v?.Scope,ago(v?.CreatedAt)]}/>`;
  else if(p==='secrets')view=html`<${Ls} title=Secrets ep=/api/secrets cols=${['Name','Created','Updated']} map=${s=>[s.Spec?.Name,ago(s.CreatedAt),ago(s.UpdatedAt)]}/>`;
  else if(p==='configs')view=html`<${Ls} title=Configs ep=/api/configs cols=${['Name','Created','Updated']} map=${s=>[s.Spec?.Name,ago(s.CreatedAt),ago(s.UpdatedAt)]}/>`;
  else if(p==='tasks')view=html`<${Ls} title=Tasks ep=/api/tasks cols=${['ID','Service','Node','State','Updated']} map=${t=>[t.ID?.slice(0,12),t.ServiceID?.slice(0,12),t.NodeID?.slice(0,12),bg(t.Status?.State),ago(t.UpdatedAt)]}/>`;
  else if(p==='audit')view=html`<${Audit}/>`;
  else if(p==='stacks'&&id)view=html`<${Ls} title=${'Stack: '+id} ep=${'/api/stacks/'+id} cols=${['Name','Image','Mode']} map=${s=>[s.Spec?.Name,s.Spec?.TaskTemplate?.ContainerSpec?.Image?.split('@')[0],s.Spec?.Mode?.Replicated?'Replicated':'Global']} det=${s=>'#/services/'+s.ID}/>`;
  else view=html`<${Dashboard}/>`;

  return html`<div class=layout><${Nav} p=${p}/><div class=mn>${view}</div></div>`
}

render(html`<${App}/>`,document.getElementById('app'));
</script>
</body>
</html>
