name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release (e.g. 1.10)'
        required: true
        type: string

jobs:
  clojure:
    name: Test & Build Clojure (legacy)
    continue-on-error: true
    env:
      DOCKER: "25.0.5"
    runs-on: ubuntu-latest
    steps:
      - name: checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - name: install java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: install clojure tools
        uses: DeLaGuardo/setup-clojure@9.5
        with:
          lein: latest
      - run: ./init-agent.sh
        name: start Agent
        working-directory: dev/script
      - run: ./start-dind.sh
        name: start Docker in Docker
        working-directory: dev/script
      - run: lein deps
      - run: lein test :all
      - run: lein uberjar
      - name: upload release jar
        uses: actions/upload-artifact@v4
        with:
          name: swarmpit.jar
          path: target/swarmpit.jar

  docker:
    name: Build and push docker
    runs-on: ubuntu-latest
    needs: clojure
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - name: set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/ccvass/swarmpit-xpx:${{ inputs.tag || github.ref_name }}
            ghcr.io/ccvass/swarmpit-xpx:latest

  go-docker:
    name: Build and push Go backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - name: set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./... -race -count=1
      - name: set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build and push Go image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ inputs.tag || github.ref_name }}
          tags: |
            ghcr.io/ccvass/swarmpit-xpx:${{ inputs.tag || github.ref_name }}-go
            ghcr.io/ccvass/swarmpit-xpx:go

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [docker, go-docker]
    permissions:
      contents: write
      security-events: write
    steps:
      - name: checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - name: Trivy scan Go image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/ccvass/swarmpit-xpx:go
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true
      - uses: actions/download-artifact@v4
        name: download release jar
        with:
          name: swarmpit.jar
          path: target
      - name: create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: target/swarmpit.jar
          generate_release_notes: true
