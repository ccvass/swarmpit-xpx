name: Test, Build & Deploy

on:
  push:
    branches: [ 'master' ]
  pull_request:
    branches: [ 'master' ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  clojure:
    name: Test & Build Clojure
    env:
      DOCKER: "25.0.5"
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: install java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: install clojure tools
        uses: DeLaGuardo/setup-clojure@9.5
        with:
          lein: latest
      - run: ./init-agent.sh
        name: start Agent
        working-directory: dev/script
      - run: ./start-dind.sh
        name: start Docker in Docker
        working-directory: dev/script
      - run: lein deps
      - run: lein test :all
      - run: lein uberjar
      - name: upload release jar
        uses: actions/upload-artifact@v4
        with:
          name: swarmpit.jar
          path: target/swarmpit.jar
  docker:
    name: Build and push docker
    runs-on: ubuntu-latest
    needs: clojure
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: compute tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64/v8,linux/arm/v7
          tags: ghcr.io/ccvass/swarmpit-xpx:${{ steps.tag.outputs.value }}
