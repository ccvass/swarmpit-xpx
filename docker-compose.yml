services:
  app:
    image: ghcr.io/ccvass/swarmpit-xpx:latest
    environment:
      - SWARMPIT_DB_PATH=/app/data
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - swarmpit-data:/app/data
    ports:
      - 888:8080
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - net
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M
      placement:
        constraints:
          - node.role == manager

  agent:
    image: swarmpit/agent:latest
    environment:
      - DOCKER_API_VERSION=1.47
      - EVENT_ENDPOINT=http://app:8080/events
      - HEALTH_CHECK_ENDPOINT=http://app:8080/version
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - net
    deploy:
      mode: global
      labels:
        swarmpit.agent: 'true'
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

networks:
  net:
    driver: overlay

volumes:
  swarmpit-data:
    driver: local
